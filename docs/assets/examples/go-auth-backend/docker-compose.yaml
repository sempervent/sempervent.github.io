services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-authdb}
      POSTGRES_USER:     ${POSTGRES_USER:-authuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authuser} -d ${POSTGRES_DB:-authdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    restart: unless-stopped
    environment:
      APP_PORT:       ${APP_PORT:-8080}
      DATABASE_URL:   postgres://${POSTGRES_USER:-authuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-authdb}?sslmode=disable
      JWT_SECRET:     ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      BCRYPT_COST:    ${BCRYPT_COST:-12}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - admin

volumes:
  db_data:
