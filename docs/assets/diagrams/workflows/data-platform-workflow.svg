  <title>Data Platform Workflow</title>
  <desc>End-to-end data platform architecture showing IoT sensors, file drops, and APIs feeding into streaming and batch ingestion, stored in object store, PostgreSQL/PostGIS, and Delta/Iceberg tables, orchestrated by Prefect, served via REST API, dashboards, and geospatial API, governed by a data catalog and schema contracts, and observed via logs, metrics, and traces.</desc>

