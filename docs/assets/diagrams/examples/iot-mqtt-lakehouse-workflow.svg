<?xml version="1.0" encoding="utf-8"?>
<!--
  iot-mqtt-lakehouse-workflow.svg
  Source: docs/assets/diagrams/examples/iot-mqtt-lakehouse-workflow.mmd
  Regenerate: cd tools/diagrams && npm run render:all
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="IoT MQTT Lakehouse workflow: device publish to broker, pipeline consume, validate, write or dead letter, dashboard and observability">
  <title>IoT MQTT Lakehouse Workflow (L2)</title>
  <desc>Workflow: Device publishes to MQTT broker; pipeline consumes; valid writes to Parquet and Postgres, invalid goes to dead letter; dashboard queries; observability for failures.</desc>
  <defs>
    <style>
      text { font-family: system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; }
      rect.node { fill: #fff; stroke: #00897b; stroke-width: 1; rx: 4; }
      rect.decision { fill: #e0f7f4; stroke: #00897b; stroke-width: 1; }
      path.edge { stroke: #546e7a; stroke-width: 1.2; fill: none; }
      path.dashed { stroke: #90a4ae; stroke-dasharray: 4 3; fill: none; }
      marker#arr path { fill: #546e7a; }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L0,5 L6,2.5 z"/></marker>
  </defs>
  <rect width="720" height="200" fill="#fafafa"/>
  <!-- Nodes -->
  <rect class="node" x="20" y="80" width="100" height="40"/>
  <text x="70" y="105" text-anchor="middle">Device publishes</text>
  <rect class="node" x="140" y="80" width="90" height="40"/>
  <text x="185" y="105" text-anchor="middle">MQTT Broker</text>
  <rect class="node" x="250" y="80" width="110" height="40"/>
  <text x="305" y="105" text-anchor="middle">Pipeline consumes</text>
  <rect class="decision" x="380" y="75" width="70" height="50"/>
  <text x="415" y="100" text-anchor="middle">Valid?</text>
  <rect class="node" x="470" y="80" width="140" height="40"/>
  <text x="540" y="105" text-anchor="middle">Write Parquet + Postgres</text>
  <rect class="node" x="470" y="140" width="120" height="36"/>
  <text x="530" y="162" text-anchor="middle">Dead letter / alert</text>
  <rect class="node" x="630" y="80" width="70" height="40"/>
  <text x="665" y="105" text-anchor="middle">Dashboard queries</text>
  <rect class="node" x="630" y="140" width="70" height="36"/>
  <text x="665" y="162" text-anchor="middle">Observability</text>
  <!-- Edges -->
  <path class="edge" d="M120 100 L140 100" marker-end="url(#arr)"/>
  <path class="edge" d="M230 100 L250 100" marker-end="url(#arr)"/>
  <path class="edge" d="M360 100 L380 100" marker-end="url(#arr)"/>
  <path class="edge" d="M450 100 L470 100" marker-end="url(#arr)"/>
  <path class="edge" d="M415 125 L415 140 L530 158" marker-end="url(#arr)"/>
  <path class="edge" d="M610 100 L630 100" marker-end="url(#arr)"/>
  <path class="dashed" d="M530 158 L650 158" marker-end="url(#arr)"/>
</svg>
