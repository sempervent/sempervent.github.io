site_url: https://sempervent.github.io
repo_url: https://github.com/sempervent/sempervent.github.io
repo_name: sempervent/sempervent.github.io
edit_uri: blob/main/docs/

theme:
  name: material
  # Distinctive teal/cyan palette - professional yet personal
  # Maintains strong contrast for accessibility
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal  # Deep teal for professional, distinctive look
      accent: cyan   # Cyan accent for interactive elements
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal  # Consistent teal in dark mode
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  # Logo and favicon
  logo: assets/logo.svg
  # favicon: assets/favicon.png  # Uncomment when favicon is created
  # Enhanced navigation and content features for better UX
  features:
    # Navigation improvements
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant      # Instant page loads for better UX
    - navigation.indexes      # Show index pages in navigation
    # Table of contents
    - toc.integrate
    - toc.follow
    # Navigation breadcrumbs
    - navigation.path
    # Search enhancements
    - search.suggest
    - search.highlight
    - search.share
    # Content actions
    - content.code.copy       # Copy code blocks
    - content.action.edit     # Edit page link
    - content.action.view     # View source link
    - content.tabs.link       # Linkable tabs
    # Metadata
    - meta
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  # Custom CSS for typography and personalization
  custom_dir: docs/assets/overrides
  # Additional CSS for readability improvements
  extra_css:
    - assets/styles/custom.css

